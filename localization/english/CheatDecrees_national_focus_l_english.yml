l_english:
 decree_cheat_one_vision:0 "One Vision"
 decree_cheat_one_vision_desc:0 "True unity is achieved only when the ultimate goals of a nation and its people are one and the same. After all, a house divided against itself cannot stand."
 
 decree_cheat_master_builders:0 "Master Builders"
 decree_cheat_master_builders_desc:0 "Building a Megastructure requires an unprecedented amount of resources and planning. We are breaking new ground in the field of macro-engineering."
 
 decree_cheat_nihilistic_acquisition:0 "Nihilistic Acquisition"
 decree_cheat_nihilistic_acquisition_desc:0 "The notion of self-determination cannot be a moral absolute. Holistic goals clearly outweigh individual concerns."
 
 decree_cheat_mastery_of_nature:0 "Mastery of Nature"
 decree_cheat_mastery_of_nature_desc:0 "Although we mastered the nature of our homeworld long ago, the alien biomes we have since encountered present new challenges. They too shall be overcome."
 
 decree_cheat_xeno_compatibility:0 "Xeno-Compatibility"
 decree_cheat_xeno_compatibility_desc:0 "The invention of universal sexual biology has revolutionized society. Even if it sometimes requires awkward rotations to make a connection."
 
 decree_cheat_imperial_prerogative:0 "Imperial Prerogative"
 decree_cheat_imperial_prerogative_desc:0 "As our civilization continues to grow, so its beating heart must also expand. More systems will be placed under our direct control."
 
 decree_cheat_transcendent_learning:0 "Transcendent Learning"
 decree_cheat_transcendent_learning_desc:0 "Our society must change its approach towards learning, and by doing so, our best and brightest will be able to reach a completely new level of achievements."
 
 decree_cheat_executive_vigor:0 "Executive Vigor"
 decree_cheat_executive_vigor_desc:0 "There will be no half-measures or compromises when implementing the edicts decided upon by our government. We go all the way, or not at all."
 
 decree_cheat_grasp_the_void:0 "Grasp the Void"
 decree_cheat_grasp_the_void_desc:0 "The vast expanse of the galaxy holds limitless riches for those empires that understand how to maintain their grasp on the void."
 
 decree_cheat_become_the_crisis:0 "Galactic Nemesis"
 decree_cheat_become_the_crisis_desc:0 "All great works require sacrifice. The rest of the galaxy may not understand, but they will comply."
 
 decree_cheat_shared_destiny:0 "Shared Destiny"
 decree_cheat_shared_destiny_desc:0 "As we reach for ever greater heights, we must not leave behind those who have loyally served us. The glorious future of our empire was always meant to be a shared destiny."
 
 decree_cheat_universal_transactions:0 "Universal Transactions"
 decree_cheat_universal_transactions_desc:0 "We shall extend our brand and our business to every solar system in the galaxy. Prosperity is eternal!"
 
 decree_cheat_machine_worlds:0 "Machine Worlds"
 decree_cheat_machine_worlds_desc:0 "We shall shape our worlds into a mirror image of ourselves, replacing the frailty of biology with the immutable perfection of metal."
 
 decree_cheat_the_flesh_is_weak:0 "The Flesh is Weak"
 decree_cheat_the_flesh_is_weak_desc:0 "The limits and constraints imposed on us by our feeble organic bodies are simply unacceptable. To reach our full potential, we must turn to cybernetic implants."

 decree_cheat_synthetic_age:0 "Synthetic Age"
 decree_cheat_synthetic_age_desc:0 "The age of organics has come and gone, the future of the galaxy belongs to the machines. This is the dawn of a synthetic age."

decree_cheat_detox:0 "Detox"
decree_cheat_detox_desc:0 "Our newest advancements in terraforming allow us to breathe new life into a class of planets formerly considered irrevocably deadly and beyond salvation."

decree_cheat_galactic_force_projection:0  "Galactic Force Projection"
decree_cheat_galactic_force_projection_desc:0 "The fleet is the instrument by which the will of our empire is made manifest - we live or die depending on its strength."

# decree_cheat_galactic_contender:0 "Galactic Contender"
# decree_cheat_galactic_contender_desc:0 "The Fallen Empires cling to the ruins of their decrepit civilizations, ever fearful of the younger and more dynamic races that surround them. Their time has long since passed."