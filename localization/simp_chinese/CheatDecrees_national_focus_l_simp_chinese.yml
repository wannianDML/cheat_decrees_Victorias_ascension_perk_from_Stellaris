l_simp_chinese:
 decree_cheat_one_vision:0 "万众一心"
 decree_cheat_one_vision_desc:0 "真正意义上的团结，仅当国家和其人民的终极目标一致时，才能得以实现。兄弟阋于墙，外御其侮。"
 
 decree_cheat_master_builders:0 "建筑大师"
 decree_cheat_master_builders_desc:0 "建造巨型结构需要超乎想象的资源存贮和预案计划。我们正在迈向宏观工程的全新层面。"
 
 decree_cheat_nihilistic_acquisition:0 "强取豪夺"
 decree_cheat_nihilistic_acquisition_desc:0 "个体自决的原则绝不是一条道德铁律，集体的成败明显比个人得失更加重要。"
 
 decree_cheat_mastery_of_nature:0 "掌控自然"
 decree_cheat_mastery_of_nature_desc:0 "尽管在长久之前我们已经对母星的自然环境了如指掌，我们目前遭遇到的外星生命体对我们的生态学提出了新的挑战。这些挑战同样必须，也一定会被我们征服。"
 
 decree_cheat_xeno_compatibility:0 "跨物种杂交"
 decree_cheat_xeno_compatibility_desc:0 "万能型性生物学的诞生彻底改变了我们的社会面貌。虽然有时候需要更换性别来繁殖是有点麻烦。"
 
 decree_cheat_imperial_prerogative:0 "中央特权"
 decree_cheat_imperial_prerogative_desc:0 "随着我们文明不断的成长，文明的心脏地带也需要进一步的扩张。更多的星系将被置于中央政府的直接控制之下。"
 
 decree_cheat_transcendent_learning:0 "卓越学术"
 decree_cheat_transcendent_learning_desc:0 "我们的社会必须改变其对学习的态度。只要这样，我们最尖端的技术和知识人才就能达到一个新的高度。"
 
 decree_cheat_technological_ascendancy:0 "科技至上"
 decree_cheat_technological_ascendancy_desc:0 "那些曾经和魔法无异的黑科技现在已经触手可及。一个全新的科技纪元已经到来。"
 
 decree_cheat_executive_vigor:0 "高效行政"
 decree_cheat_executive_vigor_desc:0 "当我们在执行我们政府的命令时不会有一丁点的妥协，也不会因为困难而半途而废。要么不做，要么就做到底。"
 
 decree_cheat_grasp_the_void:0 "掌握太虚"
 decree_cheat_grasp_the_void_desc:0 "广袤的星系拥有着无限的财富，等待那些能够掌握太虚的帝国前去探索。"
 
 decree_cheat_become_the_crisis:0 "化身天灾"
 decree_cheat_become_the_crisis_desc:0 "一切伟大之作都需要牺牲来铸就。星系中的其他生物或许不能理解，但他们必将服从。"
 
 decree_cheat_shared_destiny:0 "共同命运"
 decree_cheat_shared_destiny_desc:0 "当我们达到伟大的高度之时，我们决不能抛弃那些忠于我们的人。我们帝国的辉煌未来是属于全体国民的。"
 
 decree_cheat_universal_transactions:0 "寰宇贸易"
 decree_cheat_universal_transactions_desc:0 "我们应当将我们的生意与品牌拓展到宇宙的每一个角落。欲望是永无止境的！"
 
 decree_cheat_machine_worlds:0 "机械世界"
 decree_cheat_machine_worlds_desc:0 "我们将把我们的世界塑造成自己的镜像，用永恒而完美的金属去取代脆弱且无能的血肉。"
 
 decree_cheat_the_flesh_is_weak:0 "血肉苦弱"
 decree_cheat_the_flesh_is_weak_desc:0 "肉体带来的孱弱和限制同星际时代已经显得格格不入了。为了完全激发我们的潜能，我们必须选择义体和电子植入物。"

 decree_cheat_synthetic_age:0 "合成时代"
 decree_cheat_synthetic_age_desc:0 "属于有机生物的时代已经落幕，宇宙的未来是属于机器的。这是合成时代的黎明。"
 
 #decree_cheat_world_shaper:0 "星球塑形师"
 #decree_cheat_world_shaper_desc:0 "通过细致的雕琢和改造来彻底地转变一个星球的生态系统，其难度不亚于让一位艺术家用软绵绵的粘土雕刻人像。"

 decree_cheat_detox:0 "排毒"
 decree_cheat_detox_desc:0 "我们在环境改造方面的最新技术突破能够让我们在一类新的行星上面孕育生命——我们此前认为这类行星极度致命，根本无法改造。"

 decree_cheat_galactic_force_projection:0 "星河力量投射"
 decree_cheat_galactic_force_projection_desc:0 "舰队是我们权力意志的延伸与执行工具——舰队力量的此消彼长决定着帝国的兴衰。"

 # decree_cheat_galactic_contender:0 "逐鹿星河"
 # decree_cheat_galactic_contender_desc:0 "失落帝国依然抱守着那堆古旧的瓦砾死死不放手，对周围的新生文明抱着无来由的恐惧和不信任。是时候将他们踹下历史的舞台了。"